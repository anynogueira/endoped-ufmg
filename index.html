<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fcfbfa">
    <title>Endoped UFMG - Pastas Obturadoras</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/logo-endoped.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/logo-endoped.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="app-main" id="app-container">
        
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <header class="top-logos">
                <img src="assets/logo-fao.png" alt="FAO UFMG" class="logo-img logo-fao">
            </header>
            
            <div class="elegant-card-container">
                <div class="info-card-elegant">
                    <p>O objetivo desse aplicativo<br>é auxiliar na escolha do<br>material obturador para<br>tratamento endodôntico de<br><span class="highlight-text">DENTES DECÍDUOS</span></p>
                </div>
            </div>
            
            <div class="start-action mt-auto">
                <button id="btn-to-instructions" class="btn btn-pill">Instruções</button>
            </div>
            
            <footer class="bottom-logos">
                <div class="logo-col">
                    <img src="assets/logo-endoped.png" alt="EndoPed UFMG" class="logo-img logo-endoped">
                </div>
                <div class="logo-col">
                    <img src="assets/logo-odontopediatria.png" alt="Odontopediatria UFMG" class="logo-img logo-odontopediatria">
                </div>
            </footer>
        </div>

        <!-- Instructions Screen -->
        <div id="instructions-screen" class="screen">
            <header class="screen-header clickable-header">
                <img src="assets/logo-fao.png" alt="FAO UFMG" class="logo-img logo-fao-small">
            </header>
            
            <div class="elegant-card-container">
                <div class="info-card-elegant">
                    <h2 class="question-title accent-title" style="margin-bottom: 1.5rem; text-transform: uppercase;">Atenção</h2>
                    <p style="font-size: 0.95rem; color: #666; text-align: left;">Siga o fluxograma respondendo às perguntas de acordo com a avaliação clínica e radiográfica do paciente.</p>
                </div>
            </div>
            
            <div class="start-action mt-auto">
                <button id="btn-start" class="btn btn-pill">Iniciar</button>
            </div>
            
            <footer class="screen-footer">
                <img src="assets/logo-odontopediatria.png" alt="Odontopediatria UFMG" class="logo-img logo-odontopediatria-small">
            </footer>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="screen">
            <header class="screen-header clickable-header">
                <img src="assets/logo-fao.png" alt="FAO UFMG" class="logo-img logo-fao-small">
            </header>

            <div class="btn-icon-wrapper">
                <button id="btn-back" class="btn-icon btn-back-styled" aria-label="Voltar" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> Voltar
                </button>
            </div>

            <div class="content-container">
                <h2 id="question-text" class="question-title">TIPO DE DENTE</h2>
                <div id="options-container" class="options-wrapper">
                    <!-- Options injected here -->
                </div>
            </div>

            <footer class="screen-footer">
                <img src="assets/logo-odontopediatria.png" alt="Odontopediatria UFMG" class="logo-img logo-odontopediatria-small">
            </footer>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <header class="screen-header clickable-header">
                <img src="assets/logo-fao.png" alt="FAO UFMG" class="logo-img logo-fao-small">
            </header>

            <div class="content-container text-center">
                <h2 class="question-title accent-title">RECOMENDAÇÃO</h2>
                <div id="result-content" class="result-card">
                    <!-- Result injected here -->
                </div>
                <div class="start-action mt-large">
                    <button id="btn-restart" class="btn btn-pill">Recomeçar</button>
                </div>
            </div>
            
            <footer class="screen-footer">
                <img src="assets/logo-odontopediatria.png" alt="Odontopediatria UFMG" class="logo-img logo-odontopediatria-small">
            </footer>
        </div>
        
        <!-- Loading -->
        <div id="loading" class="loading-overlay hidden">
            <div class="spinner"></div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
